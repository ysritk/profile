<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やしろの自己紹介</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      color: #333;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background-color: #2563eb;
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    header p {
      font-size: 1.2em;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    h2 {
      color: #2563eb;
    }

    ul {
      padding-left: 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      color: #555;
    }

    .student-icon {
      font-size: 50px;
    }
  </style>
</head>
<body>

<header>
  <div class="student-icon">🎓</div>
  <h1>やしろの自己紹介</h1>
  <p>学生ライフを楽しむプロフィールページ</p>
</header>

<div class="container">

  <div class="card">
    <h2>プロフィール</h2>
    <p>こんにちは！やしろです。現在学生として勉強や趣味を楽しみながら日々成長中です。</p>
  </div>

  <div class="card">
    <h2>好きなこと</h2>
    <ul>
      <li>ゲーム</li>
      <li>音楽を聴くこと</li>
      <li>友達と遊ぶこと</li>
    </ul>
  </div>

  <div class="card">
    <h2>学校生活</h2>
    <p>授業や部活を通して、新しいことに挑戦しています。毎日が学びの連続！</p>
  </div>

  <div class="card">
    <h2>目標</h2>
    <p>将来は自分の好きなことを仕事にして、楽しく生きていきたいです。</p>
  </div>

</div>

<footer>
  © 2026 やしろ
</footer>

</body>
</html>
